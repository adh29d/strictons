name: db / pgTAP + types drift

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/db/**'
      - '.github/workflows/db-test.yml'
  push:
    branches: [main]
    paths:
      - 'packages/db/**'
      - '.github/workflows/db-test.yml'

concurrency:
  group: db-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pgtap:
    name: pgTAP suites + types drift check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install repo dependencies
        run: pnpm install --frozen-lockfile

      - name: Install pg_prove (Perl TAP harness for pgTAP)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libtap-parser-sourcehandler-pgtap-perl \
            postgresql-client

      - name: Verify Supabase CLI is available
        working-directory: packages/db
        run: pnpm exec supabase --version

      - name: Start local Supabase
        working-directory: packages/db
        run: pnpm exec supabase start

      - name: Regenerate TypeScript types
        # Runs BEFORE the pgTAP suites. The suites' _setup.sql installs the
        # pgtap extension, which adds tap_funky and pg_all_foreign_keys
        # relations into the public schema. If gen:types runs after that
        # install, those pgTAP-internal relations leak into the application's
        # generated types. Generating first keeps the output to our schema.
        working-directory: packages/db
        run: pnpm gen:types

      - name: Verify no types drift
        working-directory: packages/db
        run: |
          if ! git diff --exit-code -- src/database.types.ts; then
            echo "::error::Generated types differ from committed src/database.types.ts."
            echo "::error::Run \`pnpm --filter @strictons/db gen:types\` locally and commit the result."
            exit 1
          fi

      - name: Run pgTAP suites
        id: run-pgtap
        working-directory: packages/db
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: pnpm db:test

      # Diagnostic-only step. Phase 6 commit b83c0f7 hit a spec-12 failure
      # whose cause isn't fetchable from sandboxes without authenticated
      # GitHub API access. On the next failure, re-run spec 12 alone with
      # psql --echo-all and ON_ERROR_STOP=0 so every statement + its error
      # is preserved in the step output, and surface failing-assertion lines
      # as `::warning::` annotations so the run-summary page exposes them
      # to the WebFetch path.
      #
      # Scoped to spec 12 only by design (the other 11 specs aren't producing
      # the regression we're chasing). REVERT after the spec-12 failure is
      # diagnosed.
      - name: Diagnostic — verbose spec 12 re-run on pgTAP failure
        if: failure() && steps.run-pgtap.conclusion == 'failure'
        working-directory: packages/db
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: |
          set +e
          mkdir -p /tmp/diag
          # Helpers may have been left in place by the main step; re-applying
          # is harmless (CREATE OR REPLACE / IF NOT EXISTS shapes).
          psql -X -q -v ON_ERROR_STOP=0 "$SUPABASE_DB_URL" \
            -f tests/_setup.sql > /tmp/diag/setup.out 2>&1
          psql -X -q -v ON_ERROR_STOP=0 "$SUPABASE_DB_URL" \
            -f tests/_helpers.sql > /tmp/diag/helpers.out 2>&1
          # Verbose re-run of spec 12 only.
          psql -X --echo-all -v ON_ERROR_STOP=0 "$SUPABASE_DB_URL" \
            -f tests/12_candidate_lists.spec.sql > /tmp/diag/spec12.out 2>&1
          echo "----- spec 12 verbose output (first 4000 lines) -----"
          head -n 4000 /tmp/diag/spec12.out
          echo "----- end spec 12 verbose output -----"
          # Surface failing-assertion + error lines as run-summary annotations
          # so they're visible without authenticated log access.
          grep -nE "^not ok|^# Failed test|^# +got|^# +expected|^ERROR:|^psql:.*: ERROR|^FATAL:" \
            /tmp/diag/spec12.out | while IFS= read -r line; do
            echo "::warning::spec12 diag: ${line}"
          done

      - name: Stop local Supabase
        if: always()
        working-directory: packages/db
        run: pnpm exec supabase stop || true
